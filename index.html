<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>

<!-- ════════════════════════════════════════════════════════════════
     FIREBASE AUTH  (v10 modular SDK via CDN — no build step needed)
     ════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword,
           signOut, onAuthStateChanged }            from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, collection, addDoc,
           getDocs, deleteDoc, doc,
           query, orderBy, serverTimestamp }        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  /*
   * FIRESTORE SETUP (one-time):
   *   1. Firebase console → Firestore Database → Create database (production mode)
   *   2. Rules tab → paste:
   *        rules_version = '2';
   *        service cloud.firestore {
   *          match /databases/{database}/documents {
   *            match /users/{uid}/invoices/{id} {
   *              allow read, write: if request.auth != null && request.auth.uid == uid;
   *            }
   *          }
   *        }
   */

  const firebaseConfig = {
    apiKey:            "AIzaSyDJfbyTrNZDUVon_KEvUe0lbXHGbOpjlqc",
    authDomain:        "navonma-invoice-generator.firebaseapp.com",
    projectId:         "navonma-invoice-generator",
    storageBucket:     "navonma-invoice-generator.firebasestorage.app",
    messagingSenderId: "772880642137",
    appId:             "1:772880642137:web:edeccac2467117c51e0148",
    measurementId:     "G-7523LP7TJV"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  /* Watch auth state — show/hide screens accordingly */
  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-shell').style.display    = 'flex';
      document.getElementById('user-email').textContent     = user.email;
      window.loadInvoicesList();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-shell').style.display    = 'none';
    }
  });

  /* Login handler — called from the button */
  window.doLogin = async () => {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');

    errEl.textContent = '';
    btn.disabled      = true;
    btn.textContent   = 'Signing in…';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      /* onAuthStateChanged above will handle the UI transition */
    } catch (err) {
      const msgs = {
        'auth/invalid-credential':      'Incorrect email or password.',
        'auth/user-not-found':          'No account found for this email.',
        'auth/wrong-password':          'Incorrect password.',
        'auth/invalid-email':           'Please enter a valid email address.',
        'auth/too-many-requests':       'Too many attempts. Try again later.',
        'auth/network-request-failed':  'Network error. Check your connection.',
      };
      errEl.textContent = msgs[err.code] || 'Login failed. Please try again.';
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  };

  /* Sign-out handler */
  window.doLogout = () => signOut(auth);

  /* Allow pressing Enter to submit */
  window.loginKeydown = e => { if (e.key === 'Enter') window.doLogin(); };

  /* ── Firestore: save current invoice ── */
  window.saveInvoice = async (data) => {
    const user = auth.currentUser;
    if (!user) throw new Error('Not authenticated');
    await addDoc(collection(db, 'users', user.uid, 'invoices'), {
      ...data,
      created_at: serverTimestamp(),
      updated_at: serverTimestamp(),
    });
    await window.loadInvoicesList();
  };

  /* ── Firestore: delete invoice by id ── */
  window.deleteInvoice = async (id) => {
    if (!confirm('Delete this invoice?')) return;
    const user = auth.currentUser;
    if (!user) throw new Error('Not authenticated');
    await deleteDoc(doc(db, 'users', user.uid, 'invoices', id));
    await window.loadInvoicesList();
  };

  /* ── Firestore: fetch and render invoices list ── */
  window.loadInvoicesList = async () => {
    const user = auth.currentUser;
    if (!user) return;
    const snap = await getDocs(
      query(collection(db, 'users', user.uid, 'invoices'), orderBy('created_at', 'desc'))
    );
    const invoices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (window.renderInvoicesList) window.renderInvoicesList(invoices);
  };
</script>

<!-- PDF libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ════════════════════════════════════
     LOGIN SCREEN
     Powered by Firebase Authentication
════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">Navonma Technologies</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access Invoice Generator</p>

    <div class="login-field">
      <label>Email</label>
      <input type="email"
             id="login-email"
             placeholder="you@example.com"
             autocomplete="email"
             onkeydown="loginKeydown(event)">
    </div>

    <div class="login-field">
      <label>Password</label>
      <input type="password"
             id="login-password"
             placeholder="••••••••••"
             autocomplete="current-password"
             onkeydown="loginKeydown(event)">
    </div>

    <div id="login-error" class="login-error"></div>

    <button id="login-btn" class="login-btn" onclick="doLogin()">Sign In</button>

    <div class="login-footer">
      Secured by Firebase Authentication &nbsp;·&nbsp; Google
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     APP SHELL  (revealed after login)
════════════════════════════════════ -->
<div id="app-shell">

  <div class="top-bar">
    <h1 class="app-title">Invoice Generator</h1>
    <div class="top-bar-right">
      <span id="user-email"></span>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <!-- ── SAVED INVOICES BAR ── -->
  <div class="invoices-bar">
    <div class="invoices-bar-header" onclick="toggleInvoicesPanel()">
      <span class="invoices-bar-title">Saved Invoices</span>
      <span id="invoices-badge" class="invoices-badge">0</span>
      <span id="invoices-toggle-icon" class="invoices-toggle-icon">▾</span>
    </div>
    <div class="invoices-list-wrap" id="invoices-list-wrap">
      <div id="invoices-list"><p class="invoices-empty">Loading…</p></div>
    </div>
  </div>

  <div class="editor-wrapper">

    <!-- ── FORM PANEL ── -->
    <div class="form-panel">
      <h2>Invoice Details</h2>

      <div class="form-section">
        <h3>Invoice Info</h3>
        <div class="form-group">
          <label>Invoice No.</label>
          <input type="text" id="inv-number" placeholder="Auto">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="inv-date" value="2026-03-31">
        </div>
        <div class="form-group">
          <label>Currency</label>
          <select id="currency-select">
            <option value="INR" data-symbol="₹"   data-locale="en-IN">₹   INR — Indian Rupee</option>
            <option value="EUR" data-symbol="€"   data-locale="en-GB" selected>€   EUR — Euro</option>
            <option value="USD" data-symbol="$"   data-locale="en-US">$   USD — US Dollar</option>
            <option value="GBP" data-symbol="£"   data-locale="en-GB">£   GBP — British Pound</option>
            <option value="JPY" data-symbol="¥"   data-locale="ja-JP">¥   JPY — Japanese Yen</option>
            <option value="CNY" data-symbol="¥"   data-locale="zh-CN">¥   CNY — Chinese Yuan</option>
            <option value="AED" data-symbol="د.إ" data-locale="ar-AE">د.إ AED — UAE Dirham</option>
            <option value="SGD" data-symbol="S$"  data-locale="en-SG">S$  SGD — Singapore Dollar</option>
            <option value="AUD" data-symbol="A$"  data-locale="en-AU">A$  AUD — Australian Dollar</option>
            <option value="CAD" data-symbol="C$"  data-locale="en-CA">C$  CAD — Canadian Dollar</option>
            <option value="CHF" data-symbol="Fr"  data-locale="de-CH">Fr  CHF — Swiss Franc</option>
            <option value="SEK" data-symbol="kr"  data-locale="sv-SE">kr  SEK — Swedish Krona</option>
            <option value="DKK" data-symbol="kr"  data-locale="da-DK">kr  DKK — Danish Krone</option>
            <option value="NOK" data-symbol="kr"  data-locale="nb-NO">kr  NOK — Norwegian Krone</option>
            <option value="HKD" data-symbol="HK$" data-locale="zh-HK">HK$ HKD — Hong Kong Dollar</option>
            <option value="MYR" data-symbol="RM"  data-locale="ms-MY">RM  MYR — Malaysian Ringgit</option>
            <option value="THB" data-symbol="฿"   data-locale="th-TH">฿   THB — Thai Baht</option>
            <option value="ZAR" data-symbol="R"   data-locale="en-ZA">R   ZAR — South African Rand</option>
            <option value="BRL" data-symbol="R$"  data-locale="pt-BR">R$  BRL — Brazilian Real</option>
            <option value="MXN" data-symbol="MX$" data-locale="es-MX">MX$ MXN — Mexican Peso</option>
          </select>
        </div>
      </div>

      <div class="form-section">
        <h3>Issuer</h3>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="issuer-name" value="Navonma Technologies">
        </div>
        <div class="form-group">
          <label>Tax / GST No.</label>
          <input type="text" id="issuer-tax" value="09ENUPS8161K1ZT">
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="issuer-address">Top Floor, A-106, Sector 122, Noida, 201301</textarea>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="text" id="issuer-email" value="navonma.tech@gmail.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="issuer-phone" value="+91 9716913428">
        </div>
      </div>

      <div class="form-section">
        <h3>Recipient</h3>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="recipient-name" value="Right People Group ApS">
        </div>
        <div class="form-group">
          <label>Tax / Registration No.</label>
          <input type="text" id="recipient-tax" value="DK30590627">
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="recipient-address">Lyngbyvej 2, Kobenhavn, 2100</textarea>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="text" id="recipient-email" value="mso@rightpeoplegroup.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="recipient-phone" value="+4 531674777">
        </div>
      </div>

      <div class="form-section">
        <h3>Line Items</h3>
        <div id="items-container">
          <div class="item-row">
            <button class="remove-item" onclick="removeItem(this)" title="Remove">×</button>
            <div class="form-group">
              <label>Description</label>
              <input type="text" class="item-desc-input"
                value="Amit Kumar - 80 hrs @ €27/hr - 18/03/2026 - 31/03/2026"
                oninput="updatePreview()">
            </div>
            <div class="item-numbers">
              <div class="form-group">
                <label>Hours</label>
                <input type="number" class="item-qty" value="80" min="1" step="1" oninput="updatePreview()">
              </div>
              <div class="form-group">
                <label>Price Per Hour</label>
                <input type="number" class="item-price" value="27" min="0" step="0.01" oninput="updatePreview()">
              </div>
            </div>
          </div>
        </div>
        <button class="btn-add-item" onclick="addItem()">+ Add Line Item</button>
      </div>

      <div class="form-section">
        <h3>Notes (optional)</h3>
        <div class="form-group">
          <textarea id="inv-notes">Bank Account Details:
Bank Name -
Account Number -
SWIFT CODE - </textarea>
        </div>
      </div>

      <button class="btn-save"     onclick="saveCurrentInvoice()">⬆&nbsp; Save Invoice</button>
      <button class="btn-generate" onclick="generatePDF()">⬇&nbsp; Download PDF</button>
    </div>

    <!-- ── PREVIEW PANEL ── -->
    <div class="preview-panel">
      <div class="preview-label">Live Preview</div>
      <div class="invoice-preview" id="invoice-preview"></div>
    </div>

  </div><!-- /editor-wrapper -->
</div><!-- /app-shell -->

<script src="app.js"></script>

</body>
</html>
